<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>llama.cpp backend benchmarks</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div class="hero-title">
        <h1>Strix Halo llama.cpp Benchmarks</h1>
        <p>Prefill throughput on Ryzen AI MAX+ 395 / Radeon 8060S</p>
      </div>
      <div class="hero-meta">
        <span class="hero-chip">128GB UMA</span>
        <span id="sys-info" class="hero-chip">ROCm</span>
        <span id="run-info" class="hero-chip">Loading</span>
      </div>
    </header>

    <section class="controls simple-controls">
      <div class="control search-control">
        <label for="filter-search">Search models</label>
        <div id="model-autocomplete" class="autocomplete">
          <input id="filter-search" type="text" placeholder="Search by model, family, quant" autocomplete="off" role="combobox" aria-autocomplete="list" aria-controls="search-suggestions" aria-expanded="false">
          <div id="search-suggestions" class="autocomplete-panel" role="listbox" hidden></div>
        </div>
      </div>
      <div class="control">
        <label>Backend</label>
        <div id="filter-backend" class="backend-filter" role="group" aria-label="Backend filter"></div>
      </div>
      <div class="control action-control">
        <label>&nbsp;</label>
        <button id="reset-filters" type="button" class="chip small">Reset filters</button>
      </div>
    </section>

    <section class="protocol-strip" aria-label="Benchmark protocol">
      <div class="protocol-command" aria-label="Benchmark command">
        <code>llama-bench -m /path/to/model.gguf -o jsonl -p 2080 -d 512,10000,25000,50000,75000,100000 -b &lt;batch&gt; -ub &lt;ubatch&gt; -n 0 -r 3 -ngl 999 -fa on -mmp 0</code>
      </div>
    </section>

    <main>
      <details class="panel compact system-details">
        <summary>System and build details</summary>
        <div class="table-wrap">
          <table id="systemTable">
            <tbody></tbody>
          </table>
        </div>
      </details>

      <section class="models" id="models"></section>
    </main>

    <footer>
      <span id="datasetId"></span>
      <a href="data/benchmark.json">Dataset JSON</a>
    </footer>

    <script src="site.js"></script>
  </body>
</html>
